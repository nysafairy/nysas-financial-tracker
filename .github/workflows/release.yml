# Build desktop binaries for Windows, macOS, and Linux.
# Trigger: push a version tag (v0.1.0) or run manually from Actions.
name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artefact_pattern: NysasFinancialTracker-Windows.exe
          - os: macos-latest
            artefact_pattern: NysasFinancialTracker-macOS-*
          - os: ubuntu-latest
            artefact_pattern: NysasFinancialTracker-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Package app
        run: uv run python scripts/pack.py

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/${{ matrix.artefact_pattern }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: find release-assets -type f -print

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          body: |
            Download the build for your operating system:

            | File | Platform |
            |------|----------|
            | `NysasFinancialTracker-Windows.exe` | Windows |
            | `NysasFinancialTracker-macOS-arm64` | Apple Silicon Mac |
            | `NysasFinancialTracker-macOS-x64` | Intel Mac (if published) |
            | `NysasFinancialTracker-Linux` | Linux |

            **Windows:** if SmartScreen warns, choose More info then Run anyway.
            **macOS:** if Gatekeeper blocks the app, right-click Open, or allow it under System Settings → Privacy & Security.
            **Linux:** may need WebKitGTK for the native window; otherwise set `UK_FINANCE_BROWSER=1` and open the printed URL.

            Your data is stored locally under `Documents/NysasFinancialTracker/`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
